apiVersion: v1
kind: Namespace
metadata:
  name: s3mock
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: s3mock
  namespace: s3mock
spec:
  replicas: 1
  selector:
    matchLabels:
      app: s3mock
  template:
    metadata:
      labels:
        app: s3mock
    spec:
      containers:
        - name: s3mock
          image: adobe/s3mock:latest
          ports:
            - containerPort: 9090
              name: http
          env:
            - name: initialBuckets
              value: "cnpg-backups"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: s3mock
  namespace: s3mock
spec:
  selector:
    app: s3mock
  ports:
    - name: http
      port: 80
      targetPort: 9090
