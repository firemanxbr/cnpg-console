# =============================================================================
# Demo resources for CNPG Console development
# Creates a full set of CNPG resources to showcase all console features
# =============================================================================

# --- S3 credentials for S3Mock (accepts any credentials) ---
apiVersion: v1
kind: Secret
metadata:
  name: s3-creds
  namespace: default
type: Opaque
stringData:
  ACCESS_KEY_ID: "dev-access-key"
  ACCESS_SECRET_KEY: "dev-secret-key"
---
# --- PostgreSQL Cluster (3 instances with backup to S3Mock) ---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: sample-pg
  namespace: default
spec:
  description: "Sample PostgreSQL cluster for development"
  instances: 3
  storage:
    size: 1Gi
  bootstrap:
    initdb:
      database: app
      owner: app
  backup:
    barmanObjectStore:
      destinationPath: "s3://cnpg-backups/"
      endpointURL: "http://s3mock.s3mock.svc.cluster.local"
      s3Credentials:
        accessKeyId:
          name: s3-creds
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: s3-creds
          key: ACCESS_SECRET_KEY
    retentionPolicy: "7d"
---
# --- PgBouncer Connection Pooler ---
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: sample-pg-pooler
  namespace: default
spec:
  cluster:
    name: sample-pg
  instances: 1
  type: rw
  pgbouncer:
    poolMode: transaction
---
# --- Declarative Database ---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: sample-pg-analytics
  namespace: default
spec:
  cluster:
    name: sample-pg
  name: analytics
  owner: app
---
# --- Second Database ---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: sample-pg-reporting
  namespace: default
spec:
  cluster:
    name: sample-pg
  name: reporting
  owner: app
---
# --- Scheduled Backup (daily at 2am) ---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: sample-pg-daily
  namespace: default
spec:
  schedule: "0 0 2 * * *"
  cluster:
    name: sample-pg
  method: barmanObjectStore
  backupOwnerReference: cluster
---
# --- On-demand Backup ---
apiVersion: postgresql.cnpg.io/v1
kind: Backup
metadata:
  name: sample-pg-backup-initial
  namespace: default
spec:
  cluster:
    name: sample-pg
  method: barmanObjectStore
  target: prefer-standby
