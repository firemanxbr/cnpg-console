name: Release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
  packages: write
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: firemanxbr/cnpg-console
jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with: { registry: ghcr.io, username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}" }
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/firemanxbr/cnpg-console
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: "${{ steps.meta.outputs.tags }}"
          cache-from: type=gha
          cache-to: type=gha,mode=max
  cli:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.22" }
      - run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build \
            -ldflags "-X github.com/firemanxbr/cnpg-console/pkg/version.Version=${GITHUB_REF_NAME}" \
            -o cnpg-console-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/cnpg-console
      - uses: softprops/action-gh-release@v2
        with: { files: cnpg-console-* }
  helm-chart:
    runs-on: ubuntu-latest
    needs: image
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: azure/setup-helm@v4
      - run: |
          V=${GITHUB_REF_NAME#v}
          sed -i "s/^version:.*/version: $V/" helm/cnpg-console/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$V\"/" helm/cnpg-console/Chart.yaml
          helm package helm/cnpg-console -d .pkg
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages
          cp .pkg/*.tgz .
          helm repo index . --url https://firemanxbr.github.io/cnpg-console
          git add *.tgz index.yaml
          git commit -m "chart ${GITHUB_REF_NAME}"
          git push origin gh-pages
