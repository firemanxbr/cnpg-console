replicaCount: 1
image:
  repository: ghcr.io/firemanxbr/cnpg-console
  pullPolicy: IfNotPresent
  tag: ""
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""
rbac:
  create: true
service:
  type: ClusterIP
  port: 8080
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: cnpg-console.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi
dex:
  enabled: true
  image:
    repository: ghcr.io/dexidp/dex
    tag: v2.41.1
  connectors: []
  # Example:
  #  - type: github
  #    id: github
  #    name: GitHub
  #    config:
  #      clientID: ""
  #      clientSecret: ""
  #      redirectURI: "https://cnpg-console.example.com/callback"
  staticClients:
    - id: cnpg-console
      name: CNPG Console
      secret: "change-me-in-production"
      redirectURIs:
        - "http://localhost:8080/callback"
objectStorage:
  storageClass: ""
  bucketName: ""
  endpointURL: ""
nodeSelector: {}
tolerations: []
affinity: {}

# --- Demo / Bootstrap mode ---
# When enabled, creates sample CNPG resources to showcase all console features.
# Useful for demos, trade shows, and contributor onboarding. Disable in production.
demo:
  enabled: true
  # S3-compatible object storage for backup testing (Adobe S3Mock, Apache 2.0)
  s3mock:
    enabled: true
    image: adobe/s3mock:latest
    bucket: cnpg-backups
  # Sample PostgreSQL cluster
  cluster:
    name: demo-pg
    instances: 3
    storage: 1Gi
    database: app
    owner: app
    description: "Demo PostgreSQL cluster managed by CNPG Console"
  # Sample PgBouncer pooler
  pooler:
    name: demo-pooler
    instances: 1
    type: rw
    poolMode: transaction
  # Sample database
  database:
    name: demo-db
    owner: app
  # Sample scheduled backup (every day at 2am)
  scheduledBackup:
    name: demo-daily-backup
    schedule: "0 0 2 * * *"
    method: barmanObjectStore
